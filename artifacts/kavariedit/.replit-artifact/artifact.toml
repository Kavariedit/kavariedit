kind = "web"
previewPath = "/"
title = "Kavariedit"
version = "1.0.0"
id = "artifacts/kavariedit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19323
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kavariedit run dev"

[services.env]
PORT = "19323"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kavariedit", "run", "build"]
publicDir = "artifacts/kavariedit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
